spring:
  application:
    name: xml-processor

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/xmlprocessor
    username: ${DB_USERNAME:xmlprocessor}
    password: ${DB_PASSWORD:xmlprocessor}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          max-interval: 10000
          multiplier: 2.0

# ── Application queues & exchange ────────────────────────────────────────────
app:
  amqp:
    exchange: xml-processor-exchange
    input-queue: xml.input
    return-queue: xml.return
    output-queue: xml.output

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.octoacme: INFO
    org.springframework.amqp: WARN
